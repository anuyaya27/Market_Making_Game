<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fermi Market Making Game</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: #0f1e33;
      --panel-2: #13263f;
      --line: #233b5c;
      --line-2: #315078;
      --text: #f6f8fb;
      --muted: #9fb0c7;
      --blue: #2f80ed;
      --blue-2: #1b63c4;
      --green: #21a67a;
      --green-2: #17815e;
      --red: #ff6b6b;
      --yellow: #f4c430;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top left, #0d2440 0, var(--bg) 36rem);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    header {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 18px;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      margin-bottom: 8px;
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0;
    }

    h2 { margin-bottom: 16px; font-size: 1.25rem; }
    h3 { margin-bottom: 8px; font-size: 1rem; }

    p, .muted { color: var(--muted); }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto 42px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .card {
      background: linear-gradient(180deg, var(--panel) 0%, #0b192c 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .scenario-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input, select, textarea, button {
      width: 100%;
      border-radius: 9px;
      font: inherit;
    }

    input, select, textarea {
      border: 1px solid var(--line-2);
      background: #09182a;
      color: var(--text);
      padding: 10px 12px;
      min-height: 44px;
    }

    textarea { min-height: 120px; resize: vertical; }

    button {
      border: 0;
      min-height: 44px;
      padding: 10px 14px;
      color: white;
      background: var(--blue);
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { background: var(--blue-2); }
    button:disabled { cursor: not-allowed; opacity: 0.58; }
    button.secondary { background: #162b48; border: 1px solid var(--line-2); }
    button.secondary:hover { background: #1d385d; }
    button.hint { background: var(--green); }
    button.hint:hover { background: var(--green-2); }

    .scenario-button {
      min-height: 110px;
      text-align: left;
      background: var(--panel-2);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
      justify-content: space-between;
    }

    .scenario-button:hover,
    .scenario-button.selected {
      border-color: var(--blue);
      background: #153058;
    }

    .scenario-button span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
      align-items: start;
    }

    .metric {
      background: #09182a;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      min-height: 78px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .metric strong {
      display: block;
      font-size: 1.2rem;
      overflow-wrap: anywhere;
    }

    .message {
      border: 1px solid var(--line-2);
      background: #0b1f37;
      color: var(--muted);
      border-radius: 10px;
      padding: 12px;
      margin-top: 14px;
    }

    .message.error { border-color: #8f3232; color: #ffd0d0; background: #351521; }
    .message.good { border-color: #1f815f; color: #d8ffee; background: #0b2a25; }
    .message.warn { border-color: #846816; color: #fff1bd; background: #302810; }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid var(--line-2);
      border-radius: 999px;
      color: #dce8f8;
      background: #0b1f37;
      font-size: 0.88rem;
      font-weight: 800;
    }

    .question {
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      color: var(--text);
      margin-bottom: 8px;
    }

    .hint-box, .log {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #09182a;
      padding: 12px;
      color: var(--muted);
    }

    .log {
      max-height: 280px;
      overflow: auto;
      display: grid;
      gap: 10px;
    }

    .log-entry {
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .log-entry:last-child { border-bottom: 0; padding-bottom: 0; }
    .profit { color: #7ee3b5; }
    .loss { color: var(--red); }
    .yellow { color: var(--yellow); }

    @media (max-width: 980px) {
      .scenario-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .split { grid-template-columns: 1fr; }
      .row, .grid-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      header, main { width: min(100% - 20px, 1180px); }
      .grid, .grid-3, .row, .scenario-grid { grid-template-columns: 1fr; }
      .card { padding: 15px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Fermi Market Making</h1>
    <p>Practice interview-style guesstimate markets, inventory management, and debrief math with deterministic trading and hidden true values.</p>
  </header>

  <main>
    <section id="settingsScreen" class="screen active card"></section>
    <section id="scenarioScreen" class="screen card"></section>
    <section id="openingScreen" class="screen card"></section>
    <section id="tradingScreen" class="screen card"></section>
    <section id="debriefScreen" class="screen card"></section>
  </main>

  <script>
    "use strict";

    // =========================
    // Proxy configuration
    // =========================
    // Same-origin Vercel API route.
    const PROXY_URL = "/api/openai-proxy";

    // =========================
    // Built-in scenario catalog
    // =========================
    const SCENARIOS = [
      { id: "cars-tokyo", title: "Cars Tokyo", prompt: "How many registered passenger cars are there in Tokyo?", type: "Guesstimate", fallback: 3200000, basis: "Population, household car ownership, and metro density imply several million vehicles." },
      { id: "coffee-london", title: "Coffee Shops London", prompt: "How many coffee shops are there in London?", type: "Guesstimate", fallback: 3600, basis: "A large city with many high streets and stations plausibly supports a few thousand shops." },
      { id: "roller-coasters", title: "Global Roller Coasters", prompt: "How many operating roller coasters are there in the world?", type: "Fact", fallback: 6000, basis: "Theme parks worldwide commonly host multiple coasters, totaling several thousand." },
      { id: "houses-sf", title: "Houses San Francisco", prompt: "How many housing units are there in San Francisco?", type: "Fact", fallback: 410000, basis: "Population near 800k and small household sizes imply about four hundred thousand units." },
      { id: "smartphones", title: "World Smartphones", prompt: "How many smartphones are currently in active use worldwide?", type: "Guesstimate", fallback: 6800000000, basis: "Global population and high smartphone penetration imply several billion devices." },
      { id: "bikes-amsterdam", title: "Bikes Amsterdam", prompt: "How many bicycles are there in Amsterdam?", type: "Fact", fallback: 900000, basis: "Bike ownership around one per resident puts the count near one million." },
      { id: "global-flights", title: "Global Flights", prompt: "How many commercial passenger flights happen worldwide in one day?", type: "Guesstimate", fallback: 100000, basis: "Large airports, regional routes, and airline schedules imply roughly one hundred thousand daily flights." },
      { id: "us-pizza", title: "US Pizza Shops", prompt: "How many pizza restaurants are there in the United States?", type: "Fact", fallback: 75000, basis: "Tens of thousands of chain and independent locations operate nationally." },
      { id: "nyc-taxis", title: "NYC Taxis", prompt: "How many licensed yellow taxis are there in New York City?", type: "Fact", fallback: 13500, basis: "Medallion taxi counts have historically been around the low tens of thousands." },
      { id: "india-atms", title: "ATMs India", prompt: "How many ATMs are there in India?", type: "Fact", fallback: 220000, basis: "Banking infrastructure across cities and towns supports a few hundred thousand machines." },
      { id: "uk-dogs", title: "Dogs United Kingdom", prompt: "How many pet dogs are there in the United Kingdom?", type: "Guesstimate", fallback: 13000000, basis: "Households, pet ownership rates, and multi-dog homes imply low tens of millions." },
      { id: "us-gas", title: "US Gas Stations", prompt: "How many gas stations are there in the United States?", type: "Fact", fallback: 145000, basis: "The national retail fueling network is in the low hundreds of thousands." },
      { id: "paris-hotels", title: "Hotels Paris", prompt: "How many hotel rooms are there in Paris?", type: "Guesstimate", fallback: 85000, basis: "Tourism capacity across thousands of hotels implies tens of thousands of rooms." },
      { id: "global-airports", title: "Global Airports", prompt: "How many airports are there in the world?", type: "Fact", fallback: 40000, basis: "Including small and regional airfields makes the global count tens of thousands." },
      { id: "china-students", title: "College Students China", prompt: "How many university students are there in China?", type: "Guesstimate", fallback: 47000000, basis: "Large youth cohorts and high tertiary enrollment imply many tens of millions." },
      { id: "us-babies", title: "US Births Per Day", prompt: "How many babies are born in the United States per day?", type: "Guesstimate", fallback: 10000, basis: "Annual births around a few million divide to roughly ten thousand daily." },
      { id: "world-elevators", title: "World Elevators", prompt: "How many elevators are installed worldwide?", type: "Guesstimate", fallback: 20000000, basis: "Urban high-rise buildings and commercial stock imply tens of millions of units." },
      { id: "amazon-packages", title: "Amazon Packages Daily", prompt: "How many packages does Amazon deliver globally per day?", type: "Guesstimate", fallback: 6000000, basis: "Annual order volume divided by days gives a multi-million daily figure." }
    ];

    const SPREADS = {
      predefined: { label: "Predefined", pct: 0.15 },
      five: { label: "5% spread", pct: 0.05 },
      ten: { label: "10% spread", pct: 0.10 },
      twenty: { label: "20% spread", pct: 0.20 }
    };

    // =========================
    // Game-state object
    // =========================
    const state = {
      screen: "settings",
      settings: {
        spreadType: "ten",
        traderLanguage: false,
        technicalQuestions: "mix",
        questionType: "guesstimate",
        traderMode: "adversarial"
      },
      scenarioCache: {},
      scenario: null,
      round: 0,
      maxRounds: 7,
      seed: 1,
      trueValue: null,
      trueLower: null,
      trueUpper: null,
      openingBid: null,
      openingAsk: null,
      lastBid: null,
      lastAsk: null,
      lastBidVol: 1,
      lastAskVol: 1,
      position: 0,
      avgEntry: 0,
      cash: 0,
      realizedPnl: 0,
      tradeLog: [],
      currentTraderAction: null,
      currentTraderMessage: "",
      hint: "",
      loading: false,
      message: ""
    };

    const screens = {
      settings: document.getElementById("settingsScreen"),
      scenario: document.getElementById("scenarioScreen"),
      opening: document.getElementById("openingScreen"),
      trading: document.getElementById("tradingScreen"),
      debrief: document.getElementById("debriefScreen")
    };

    // =========================
    // Utility and seeded randomness
    // =========================
    function fmt(n) {
      if (!Number.isFinite(n)) return "-";
      const abs = Math.abs(n);
      if (abs >= 1000000000) return (n / 1000000000).toFixed(2) + "B";
      if (abs >= 1000000) return (n / 1000000).toFixed(2) + "M";
      if (abs >= 10000) return Math.round(n).toLocaleString();
      return Number(n).toFixed(2);
    }

    function cls(n) {
      if (n > 0) return "profit";
      if (n < 0) return "loss";
      return "";
    }

    function hashString(text) {
      let h = 2166136261;
      for (let i = 0; i < text.length; i += 1) {
        h ^= text.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function seededRandom() {
      state.seed = Math.imul(1664525, state.seed) + 1013904223;
      return (state.seed >>> 0) / 4294967296;
    }

    function numeric(value) {
      const n = Number.parseFloat(value);
      return Number.isFinite(n) ? n : null;
    }

    function setScreen(name) {
      state.screen = name;
      Object.keys(screens).forEach((key) => screens[key].classList.toggle("active", key === name));
      render();
    }

    function showMessage(text, tone) {
      if (!text) return "";
      return '<div class="message ' + (tone || "") + '">' + escapeHtml(text) + "</div>";
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[ch]));
    }

    // =========================
    // Proxy-call helpers
    // =========================
    async function proxyRequest(payload) {
      if (!PROXY_URL) throw new Error("Set PROXY_URL at the top of index.html after deploying the Vercel function.");
      const response = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error("Proxy request failed with status " + response.status);
      return response.json();
    }

    async function loadScenario(scenario) {
      state.loading = true;
      state.message = "Loading scenario from proxy...";
      renderScenarioScreen();

      if (state.scenarioCache[scenario.id]) {
        state.loading = false;
        applyScenario(state.scenarioCache[scenario.id]);
        return;
      }

      let normalized;
      let warning = "";
      try {
        const data = await proxyRequest({ action: "scenario", scenario });
        normalized = normalizeScenarioResponse(scenario, data);
      } catch (err) {
        normalized = normalizeScenarioResponse(scenario, {
          question: scenario.prompt + " Please make a confidence interval of 95%.",
          trueValue: scenario.fallback,
          justification: scenario.basis
        });
        warning = "Proxy unavailable, using the built-in cached estimate. " + err.message;
      } finally {
        state.loading = false;
      }

      state.scenarioCache[scenario.id] = normalized;
      applyScenario(normalized);
      if (warning) {
        state.message = warning;
        renderOpeningScreen();
      }
    }

    function normalizeScenarioResponse(base, data) {
      const trueValue = Math.max(1, Number(data.trueValue || base.fallback));
      return {
        id: base.id,
        title: base.title,
        type: base.type,
        question: String(data.question || base.prompt) + (String(data.question || "").includes("95%") ? "" : " Please make a confidence interval of 95%."),
        trueValue,
        trueLower: Math.max(0, Number(data.trueLower || trueValue * 0.9)),
        trueUpper: Math.max(trueValue, Number(data.trueUpper || trueValue * 1.1)),
        justification: String(data.justification || base.basis)
      };
    }

    function applyScenario(scenarioData) {
      state.scenario = scenarioData;
      state.trueValue = scenarioData.trueValue;
      state.trueLower = scenarioData.trueLower;
      state.trueUpper = scenarioData.trueUpper;
      state.seed = hashString(scenarioData.id + ":" + scenarioData.trueValue + ":" + state.settings.traderMode);
      resetTradingState();
      setScreen("opening");
    }

    async function getHint() {
      if (!state.scenario) return;
      state.loading = true;
      state.hint = "Loading hint...";
      renderOpeningScreen();
      try {
        const data = await proxyRequest({
          action: "hint",
          scenario: { id: state.scenario.id, title: state.scenario.title, question: state.scenario.question }
        });
        state.hint = String(data.hint || "Break it into population, relevant rate, and units per person.");
      } catch (err) {
        state.hint = "Break the estimate into a population base, a participation or ownership rate, and units per participant. Do not anchor on a single guess.";
      } finally {
        state.loading = false;
        renderOpeningScreen();
      }
    }

    // =========================
    // Deterministic trader-decision function
    // =========================
    function decideTrader(mode, bid, ask) {
      if (mode === "random") {
        const roll = seededRandom();
        if (roll < 0.4) return "buy";
        if (roll < 0.8) return "sell";
        return "pass";
      }

      if (ask < state.trueValue) return "buy";
      if (bid > state.trueValue) return "sell";
      return "pass";
    }

    function traderText(action) {
      const side = action === "buy" ? "I will buy." : action === "sell" ? "I will sell." : "I will pass.";
      const spread = Math.round(getMaxSpreadPct() * 100);
      if (!state.settings.traderLanguage) {
        return side + " Next market max spread: " + spread + "%.";
      }
      return side + " Please make me a next market with a maximum spread of " + spread + "%.";
    }

    // =========================
    // P&L and position engine
    // =========================
    function resetTradingState() {
      Object.assign(state, {
        round: 0,
        openingBid: null,
        openingAsk: null,
        lastBid: null,
        lastAsk: null,
        lastBidVol: 1,
        lastAskVol: 1,
        position: 0,
        avgEntry: 0,
        cash: 0,
        realizedPnl: 0,
        tradeLog: [],
        currentTraderAction: null,
        currentTraderMessage: "",
        hint: "",
        message: ""
      });
    }

    function applyTrade(action, volume, price) {
      const signed = action === "buy" ? -volume : volume;
      state.cash += action === "buy" ? price * volume : -price * volume;

      if (signed > 0) addLong(volume, price);
      if (signed < 0) addShort(volume, price);
    }

    function addLong(volume, price) {
      if (state.position >= 0) {
        const newPos = state.position + volume;
        state.avgEntry = ((state.avgEntry * state.position) + price * volume) / newPos;
        state.position = newPos;
        return;
      }

      const closing = Math.min(volume, Math.abs(state.position));
      state.realizedPnl += (state.avgEntry - price) * closing;
      state.position += closing;
      const remaining = volume - closing;
      if (state.position === 0) state.avgEntry = 0;
      if (remaining > 0) {
        state.position = remaining;
        state.avgEntry = price;
      }
    }

    function addShort(volume, price) {
      if (state.position <= 0) {
        const oldSize = Math.abs(state.position);
        const newSize = oldSize + volume;
        state.avgEntry = ((state.avgEntry * oldSize) + price * volume) / newSize;
        state.position -= volume;
        return;
      }

      const closing = Math.min(volume, state.position);
      state.realizedPnl += (price - state.avgEntry) * closing;
      state.position -= closing;
      const remaining = volume - closing;
      if (state.position === 0) state.avgEntry = 0;
      if (remaining > 0) {
        state.position = -remaining;
        state.avgEntry = price;
      }
    }

    function unrealizedPnl() {
      if (state.position > 0) return (state.trueValue - state.avgEntry) * state.position;
      if (state.position < 0) return (state.avgEntry - state.trueValue) * Math.abs(state.position);
      return 0;
    }

    function totalPnl() {
      return state.cash + state.position * state.trueValue;
    }

    function breakEvenPrice() {
      if (state.position === 0) return null;
      if (state.position > 0) return state.avgEntry - state.realizedPnl / state.position;
      return state.avgEntry + state.realizedPnl / Math.abs(state.position);
    }

    function getMaxSpreadPct() {
      return SPREADS[state.settings.spreadType].pct;
    }

    function spreadPct(bid, ask) {
      const mid = (bid + ask) / 2;
      return mid > 0 ? (ask - bid) / mid : Infinity;
    }

    function hasConverged(bid, ask) {
      return bid >= state.trueLower && ask <= state.trueUpper;
    }

    // =========================
    // Actions
    // =========================
    function saveSettings() {
      state.settings.spreadType = document.getElementById("spreadType").value;
      state.settings.traderLanguage = document.getElementById("traderLanguage").value === "yes";
      state.settings.technicalQuestions = document.getElementById("technicalQuestions").value;
      state.settings.questionType = document.getElementById("questionType").value;
      state.settings.traderMode = document.getElementById("traderMode").value;
      state.message = "";
      setScreen("scenario");
    }

    function submitOpeningMarket() {
      const bid = numeric(document.getElementById("openingBid").value);
      const ask = numeric(document.getElementById("openingAsk").value);
      if (bid === null || ask === null || ask <= bid) {
        state.message = "Enter a valid opening market with ask greater than bid.";
        renderOpeningScreen();
        return;
      }
      state.openingBid = bid;
      state.openingAsk = ask;
      state.lastBid = bid;
      state.lastAsk = ask;
      state.lastBidVol = 1;
      state.lastAskVol = 1;
      startNextRound();
    }

    function startNextRound() {
      state.round += 1;
      const action = decideTrader(state.settings.traderMode, state.lastBid, state.lastAsk);
      const volume = action === "buy" ? state.lastAskVol : action === "sell" ? state.lastBidVol : 0;
      const price = action === "buy" ? state.lastAsk : action === "sell" ? state.lastBid : null;
      if (action !== "pass") {
        applyTrade(action, volume, price);
      }
      state.tradeLog.unshift({
        round: state.round,
        action,
        volume,
        price,
        bid: state.lastBid,
        ask: state.lastAsk,
        position: state.position,
        cash: state.cash,
        pnl: totalPnl()
      });
      state.currentTraderAction = action;
      state.currentTraderMessage = traderText(action);
      state.message = "";
      setScreen("trading");
    }

    function submitRoundMarket() {
      const bidVol = numeric(document.getElementById("bidVol").value) || 1;
      const bid = numeric(document.getElementById("bidPrice").value);
      const askVol = numeric(document.getElementById("askVol").value) || 1;
      const ask = numeric(document.getElementById("askPrice").value);

      if (bid === null || ask === null || ask <= bid) {
        state.message = "Ask must be greater than bid.";
        renderTradingScreen();
        return;
      }
      if (bidVol <= 0 || askVol <= 0) {
        state.message = "Bid and ask volumes must be positive.";
        renderTradingScreen();
        return;
      }
      if (spreadPct(bid, ask) > getMaxSpreadPct() + 0.0000001) {
        state.message = "Spread is too wide. Maximum allowed is " + Math.round(getMaxSpreadPct() * 100) + "% of mid.";
        renderTradingScreen();
        return;
      }

      state.lastBid = bid;
      state.lastAsk = ask;
      state.lastBidVol = bidVol;
      state.lastAskVol = askVol;

      if (hasConverged(bid, ask) || state.round >= state.maxRounds) {
        state.message = hasConverged(bid, ask)
          ? "Stopped early: your quote converged inside the true range."
          : "Seven rounds completed.";
        setScreen("debrief");
      } else {
        startNextRound();
      }
    }

    // =========================
    // Screen render functions
    // =========================
    function render() {
      renderSettingsScreen();
      renderScenarioScreen();
      renderOpeningScreen();
      renderTradingScreen();
      renderDebriefScreen();
    }

    function renderSettingsScreen() {
      screens.settings.innerHTML = `
        <h2>Settings</h2>
        <div class="grid">
          <div>
            <label for="spreadType">Spread Type</label>
            <select id="spreadType">
              <option value="predefined">Predefined</option>
              <option value="five">5% spread</option>
              <option value="ten">10% spread</option>
              <option value="twenty">20% spread</option>
            </select>
          </div>
          <div>
            <label for="traderLanguage">Trader Language</label>
            <select id="traderLanguage">
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </div>
          <div>
            <label for="technicalQuestions">Technical Questions</label>
            <select id="technicalQuestions">
              <option value="mix">Mix</option>
              <option value="breakeven">Break-even</option>
              <option value="pnl">PnL</option>
            </select>
          </div>
          <div>
            <label for="questionType">Question Type</label>
            <select id="questionType">
              <option value="fact">Fact</option>
              <option value="guesstimate">Guesstimate</option>
            </select>
          </div>
          <div>
            <label for="traderMode">Trader Mode</label>
            <select id="traderMode">
              <option value="adversarial">Adversarial / informed</option>
              <option value="random">Random / noisy</option>
            </select>
          </div>
        </div>
        <div class="toolbar">
          <span class="pill">All game mechanics run locally in deterministic JavaScript.</span>
          <button style="max-width: 260px;" onclick="saveSettings()">Proceed to Scenarios</button>
        </div>
      `;
      document.getElementById("spreadType").value = state.settings.spreadType;
      document.getElementById("traderLanguage").value = state.settings.traderLanguage ? "yes" : "no";
      document.getElementById("technicalQuestions").value = state.settings.technicalQuestions;
      document.getElementById("questionType").value = state.settings.questionType;
      document.getElementById("traderMode").value = state.settings.traderMode;
    }

    function renderScenarioScreen() {
      const type = state.settings.questionType === "fact" ? "Fact" : "Guesstimate";
      const list = SCENARIOS.filter((s) => s.type === type);
      screens.scenario.innerHTML = `
        <h2>Scenario Selection</h2>
        <p>Select a scenario. The app asks the proxy for the question, true value, and a one-line justification, then caches that value for this game.</p>
        <div class="scenario-grid">
          ${list.map((s) => `
            <button class="scenario-button" onclick="loadScenarioById('${s.id}')" ${state.loading ? "disabled" : ""}>
              <strong>${escapeHtml(s.title)}</strong>
              <span>${escapeHtml(s.type)}</span>
            </button>
          `).join("")}
        </div>
        ${showMessage(state.message, state.message.includes("unavailable") ? "warn" : "")}
        <div class="toolbar">
          <button class="secondary" style="max-width: 180px;" onclick="setScreen('settings')">Back</button>
        </div>
      `;
    }

    function loadScenarioById(id) {
      const scenario = SCENARIOS.find((s) => s.id === id);
      if (scenario) loadScenario(scenario);
    }

    function renderOpeningScreen() {
      if (!state.scenario) return;
      screens.opening.innerHTML = `
        <div class="split">
          <div>
            <span class="pill">${escapeHtml(state.scenario.title)}</span>
            <h2 class="question">${escapeHtml(state.scenario.question)}</h2>
            <p>Make your opening 95% confidence interval. The true value remains hidden until the debrief.</p>
            <div class="grid">
              <div>
                <label for="openingBid">Bid / lower bound</label>
                <input id="openingBid" type="number" step="any" placeholder="Lower bound">
              </div>
              <div>
                <label for="openingAsk">Ask / upper bound</label>
                <input id="openingAsk" type="number" step="any" placeholder="Upper bound">
              </div>
            </div>
            <div class="toolbar">
              <button onclick="submitOpeningMarket()" style="max-width: 240px;">Submit Opening Market</button>
              <button class="hint" onclick="getHint()" style="max-width: 180px;" ${state.loading ? "disabled" : ""}>I need a hint</button>
            </div>
            ${showMessage(state.message, state.message.includes("Proxy unavailable") ? "warn" : "error")}
          </div>
          <aside>
            <div class="hint-box">
              <h3>Hint</h3>
              <p>${escapeHtml(state.hint || "Ask for a decomposition hint if you want one. It will not reveal the true value.")}</p>
            </div>
          </aside>
        </div>
      `;
    }

    function renderTradingScreen() {
      if (!state.scenario) return;
      const maxPct = Math.round(getMaxSpreadPct() * 100);
      screens.trading.innerHTML = `
        <div class="split">
          <div>
            <div class="toolbar" style="margin-top: 0;">
              <span class="pill">Round ${state.round} / ${state.maxRounds}</span>
              <span class="pill">Mode: ${state.settings.traderMode === "adversarial" ? "Adversarial / informed" : "Random / noisy"}</span>
              <span class="pill">Max spread: ${maxPct}%</span>
            </div>
            <h2>${escapeHtml(state.scenario.title)}</h2>
            <p class="question">${escapeHtml(state.currentTraderMessage)}</p>
            <div class="row">
              <div><label for="bidVol">Bid Volume</label><input id="bidVol" type="number" min="0.01" step="any" value="1"></div>
              <div><label for="bidPrice">Bid Price</label><input id="bidPrice" type="number" step="any" value="${state.lastBid || ""}"></div>
              <div><label for="askVol">Ask Volume</label><input id="askVol" type="number" min="0.01" step="any" value="1"></div>
              <div><label for="askPrice">Ask Price</label><input id="askPrice" type="number" step="any" value="${state.lastAsk || ""}"></div>
            </div>
            <div class="toolbar">
              <button onclick="submitRoundMarket()" style="max-width: 220px;">Next</button>
            </div>
            ${showMessage(state.message, "error")}
          </div>
          ${renderRiskPanel()}
        </div>
      `;
    }

    function renderRiskPanel() {
      return `
        <aside class="card" style="box-shadow: none;">
          <h2>Risk</h2>
          <div class="grid">
            <div class="metric"><span>Net position</span><strong>${fmt(state.position)}</strong></div>
            <div class="metric"><span>Average entry</span><strong>${state.position === 0 ? "-" : fmt(state.avgEntry)}</strong></div>
            <div class="metric"><span>Cash</span><strong class="${cls(state.cash)}">${fmt(state.cash)}</strong></div>
            <div class="metric"><span>Running marked P&L</span><strong>Hidden</strong></div>
          </div>
          <h3 style="margin-top: 16px;">Trade Log</h3>
          <div class="log">
            ${state.tradeLog.length ? state.tradeLog.map((t) => `
              <div class="log-entry">
                <strong>R${t.round}: Trader ${t.action === "pass" ? "passed" : (t.action === "buy" ? "bought" : "sold") + " " + fmt(t.volume) + " @ " + fmt(t.price)}</strong><br>
                <span>Quote ${fmt(t.bid)} / ${fmt(t.ask)}, pos ${fmt(t.position)}, cash ${fmt(t.cash)}</span>
              </div>
            `).join("") : "<p>No trades yet.</p>"}
          </div>
        </aside>
      `;
    }

    function renderDebriefScreen() {
      if (!state.scenario) return;
      const be = breakEvenPrice();
      const total = totalPnl();
      screens.debrief.innerHTML = `
        <h2>Final Debrief</h2>
        ${showMessage(state.message, state.message.includes("converged") ? "good" : "warn")}
        <div class="grid-3">
          <div class="metric"><span>True value</span><strong>${fmt(state.trueValue)}</strong></div>
          <div class="metric"><span>True range</span><strong>${fmt(state.trueLower)} - ${fmt(state.trueUpper)}</strong></div>
          <div class="metric"><span>Final net position</span><strong>${fmt(state.position)}</strong></div>
          <div class="metric"><span>Average entry</span><strong>${state.position === 0 ? "-" : fmt(state.avgEntry)}</strong></div>
          <div class="metric"><span>Cash</span><strong class="${cls(state.cash)}">${fmt(state.cash)}</strong></div>
          <div class="metric"><span>Break-even price</span><strong>${be === null ? "Flat" : fmt(be)}</strong></div>
          <div class="metric"><span>Realized P&L</span><strong class="${cls(state.realizedPnl)}">${fmt(state.realizedPnl)}</strong></div>
          <div class="metric"><span>Unrealized P&L</span><strong class="${cls(unrealizedPnl())}">${fmt(unrealizedPnl())}</strong></div>
          <div class="metric"><span>Total P&L</span><strong class="${cls(total)}">${fmt(total)}</strong></div>
        </div>
        <p style="margin-top: 14px;">Justification: ${escapeHtml(state.scenario.justification)}</p>
        ${renderQuestions(be, total)}
        <div class="toolbar">
          <button style="max-width: 180px;" onclick="setScreen('scenario')">Play Again</button>
          <button class="secondary" style="max-width: 180px;" onclick="setScreen('settings')">Settings</button>
        </div>
      `;
    }

    function renderQuestions(be, total) {
      const mode = state.settings.technicalQuestions;
      const questions = [];
      if (mode === "mix" || mode === "breakeven") {
        questions.push({
          id: "beAnswer",
          q: "What is your break-even price on the remaining position?",
          a: be === null ? "You are flat, so there is no remaining break-even price." : "Break-even = -cash / position = " + fmt(be) + "."
        });
      }
      if (mode === "mix" || mode === "pnl") {
        questions.push({
          id: "pnlAnswer",
          q: "Explain your P&L.",
          a: "Total marked P&L = cash + position * true value = " + fmt(state.cash) + " + " + fmt(state.position) + " * " + fmt(state.trueValue) + " = " + fmt(total) + "."
        });
      }
      return `
        <div class="card" style="margin-top: 16px; box-shadow: none;">
          <h2>Technical Questions</h2>
          ${questions.map((item) => `
            <div style="margin-bottom: 14px;">
              <label for="${item.id}">${escapeHtml(item.q)}</label>
              <textarea id="${item.id}" placeholder="Type your answer"></textarea>
              <button class="secondary" style="max-width: 180px; margin-top: 8px;" onclick="document.getElementById('${item.id}Key').style.display='block'">Reveal Answer</button>
              <div id="${item.id}Key" class="message good" style="display: none;">${escapeHtml(item.a)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
